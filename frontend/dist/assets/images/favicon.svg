<svg width="1024" height="1024" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradients -->
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4cc9f0"/>
      <stop offset="100%" stop-color="#b5179e"/>
    </linearGradient>

    <linearGradient id="ticketGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcc33"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>

  <!-- Outer ring (slightly thicker for large screens) -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#ringGrad)" stroke-width="5"/>

  <!-- Background -->
  <circle cx="32" cy="32" r="26" fill="#0b0f1a"/>

  <!-- Bigger Ticket -->
  <rect x="11" y="18" width="42" height="28" rx="8" fill="url(#ticketGrad)"/>

  <!-- Film strip holes (top) -->
  <rect x="17" y="18" width="5" height="3" fill="#0b0f1a"/>
  <rect x="26" y="18" width="5" height="3" fill="#0b0f1a"/>
  <rect x="35" y="18" width="5" height="3" fill="#0b0f1a"/>
  <rect x="44" y="18" width="5" height="3" fill="#0b0f1a"/>

  <!-- Film strip holes (bottom) -->
  <rect x="17" y="43" width="5" height="3" fill="#0b0f1a"/>
  <rect x="26" y="43" width="5" height="3" fill="#0b0f1a"/>
  <rect x="35" y="43" width="5" height="3" fill="#0b0f1a"/>
  <rect x="44" y="43" width="5" height="3" fill="#0b0f1a"/>

  <!-- Center groove -->
  <line x1="32" y1="20" x2="32" y2="44"
        stroke="#0b0f1a"
        stroke-width="2.5"
        stroke-dasharray="3,4"/>

  <!-- Larger Cinematic "B" -->
  <g transform="translate(32,32) scale(1.5)">
    <path d="
      M-6 -9
      L1 -9
      Q7 -9 7 -4
      Q7 -1 3 0
      Q7 1 7 5
      Q7 9 1 9
      L-6 9
      Z

      M-3 -6
      L1 -6
      Q4 -6 4 -4
      Q4 -2 1 -2
      L-3 -2
      Z

      M-3 2
      L1 2
      Q4 2 4 4
      Q4 6 1 6
      L-3 6
      Z
    " fill="#0b0f1a"/>
  </g>

</svg>